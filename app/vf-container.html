<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Container</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #F4F6F9;
  }

  .container {
    height: 100%;
    position: relative;
  }

  .spinner-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.3s;
  }
  .spinner-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #DDDBDA;
    border-top-color: #0070D2;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .app-iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div class="container">
  <div class="spinner-overlay" id="spinnerOverlay" role="status" aria-label="Loading">
    <div class="spinner"></div>
  </div>

  <iframe class="app-iframe" src="app.html" title="GenericCRM Application" id="appFrame"></iframe>
</div>

<script>
  setTimeout(() => {
    document.getElementById('spinnerOverlay').classList.add('hidden');
  }, 1500);
</script>

</body>
</html>
